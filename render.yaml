services:
  - type: web
    name: faa-ai
    runtime: python
    plan: free
    buildCommand: pip install --prefer-binary -r requirements.txt
    startCommand: uvicorn src.api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: AI_GAMMA4_KEY
        sync: false
      - key: AI_GAMMA4_BASE_URL
        sync: false
      - key: AI_GAMMA4_MODEL
        sync: false
      - key: HF_TOKEN
        sync: false
